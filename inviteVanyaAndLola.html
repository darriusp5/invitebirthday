<html lang="ru">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #000;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    .video-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .invite-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 5;
      pointer-events: none;
    }
    .text-block {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 92%;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
      pointer-events: none;
    }
    .text-block.visible { opacity: 1; }
    .invite-text {
      background: rgba(20, 15, 10, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 20px 24px;
      border: 1px solid rgba(255, 240, 220, 0.3);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      display: inline-block;
      max-width: 100%;
    }
    .greeting-text {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffdbb5, #ffb8c6, #ffdbb5, #ffe4c9, #ffdbb5);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .names-text {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffdbb5, #ffb8c6, #ffdbb5, #ffe4c9, #ffdbb5);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
    }
    .details-text {
      font-size: 1rem;
      font-weight: 300;
      background: linear-gradient(135deg, #ffdbb5, #ffb8c6, #ffdbb5, #ffe4c9, #ffdbb5);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s ease infinite;
    }
    .start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 15, 10, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    .start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .start-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      background: rgba(255, 245, 235, 0.2);
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 240, 220, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    .start-text {
      font-size: 1.3rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: rgba(40, 30, 20, 0.65);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 12px 28px;
      border-radius: 30px;
      color: #fffaf2;
      border: 1px solid rgba(255, 240, 220, 0.6);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }
    .safe-padding {
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  </style>
</head>

      const timings = [
